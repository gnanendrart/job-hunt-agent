kind = "web"
previewPath = "/"
title = "Job Hunt Agent"
version = "1.0.0"
id = "artifacts/job-hunt-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24030

[services.development]
run = "pnpm --filter @workspace/job-hunt-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/job-hunt-agent", "run", "build" ]
publicDir = "artifacts/job-hunt-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24030"
BASE_PATH = "/"
